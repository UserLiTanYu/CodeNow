server:
  port: 8080

spring:
  application:
    name: codenow-backend
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/codenow?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（如 user_name → userName）
    map-underscore-to-camel-case: true
    # 日志输出（开发环境开启，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段配置
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键策略：自增
      id-type: auto
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml

# Sa-Token 配置
sa-token:
  # Token 名称（同时也是 Cookie 名称）
  token-name: Authorization
  # Token 有效期（单位：秒，默认 7200，即 2 小时）
  timeout: 7200
  # 是否允许同一账号多地同时登录（true=允许，false=新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: true
  # Token 风格（uuid/simple-uuid/random-32/random-64/random-128）
  token-style: uuid
  # 是否输出操作日志
  is-log: false

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      display-name: 码上记 API
      paths-to-match: /**
      packages-to-scan: com.codenow.controller

# 日志配置（可选，降低日志噪音）
logging:
  level:
    com.codenow: debug
    com.baomidou.mybatisplus: debug
