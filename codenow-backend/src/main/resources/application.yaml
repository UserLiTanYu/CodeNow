server:
  port: 8080

spring:
  profiles:
    # 本地直接启动默认加载 application-local.yml；生产环境通过环境变量切换为 prod。
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: codenow-backend
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/codenow?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      password: ${REDIS_PASSWORD:123456}
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAIL_SSL:true}

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（如 user_name → userName）
    map-underscore-to-camel-case: true
    # 日志输出（开发环境开启，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段配置
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键策略：自增
      id-type: auto
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml

# Sa-Token 配置
sa-token:
  # Token 名称（同时也是 Cookie 名称）
  token-name: Authorization
  # Token 有效期（单位：秒，默认 7200，即 2 小时）
  timeout: 7200
  # 是否允许同一账号多地同时登录（true=允许，false=新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 Token
  is-share: true
  # JWT HMAC 签名密钥；生产环境必须通过 JWT_SECRET 覆盖
  jwt-secret-key: ${JWT_SECRET:codenow-local-development-jwt-secret-change-me}
  # 是否输出操作日志
  is-log: false

# Knife4j / SpringDoc 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.codenow.controller

# 阿里云 OSS 配置
alioss:
  endpoint: oss-cn-beijing.aliyuncs.com
  region: cn-beijing
  bucket-name: litanyu-java
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}

# 文件上传配置
upload:
  # 允许的文件类型
  allowed-types: image/jpeg,image/png,image/gif,image/webp
  # 最大文件大小（5MB）
  max-size: 5242880

storage:
  # Docker/测试环境可使用 local；生产环境建议使用 oss
  type: ${STORAGE_TYPE:oss}
  local-path: ${STORAGE_LOCAL_PATH:uploads}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

# 日志配置（可选，降低日志噪音）
logging:
  level:
    com.codenow: debug
    com.baomidou.mybatisplus: debug
