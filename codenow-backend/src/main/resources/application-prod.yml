# 生产环境配置
server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:3306/${DB_NAME:codenow}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 1
      password: ${REDIS_PASSWORD:123456}

# 阿里云 OSS 配置
alioss:
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  region: ${OSS_REGION:cn-beijing}
  bucket-name: ${OSS_BUCKET:litanyu-java}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}

# 关闭 SQL 日志（生产环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 关闭 Knife4j（生产环境不暴露 API 文档）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.codenow: info
    com.baomidou.mybatisplus: warn
