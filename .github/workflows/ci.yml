name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        working-directory: codenow-backend
        run: |
          chmod +x ./mvnw
          ./mvnw --batch-mode clean test

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: codenow-frontend/package-lock.json
      - name: Install dependencies
        working-directory: codenow-frontend
        run: npm ci
      - name: Lint
        working-directory: codenow-frontend
        run: npm run lint:check
      - name: Unit tests and coverage gate
        working-directory: codenow-frontend
        run: npm run test:coverage
      - name: Production build
        working-directory: codenow-frontend
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    env:
      DB_PASSWORD: ci_mysql_password
      DB_NAME: codenow
      DB_SSL_MODE: PREFERRED
      REDIS_PASSWORD: ci_redis_password
      JWT_SECRET: ci-jwt-secret-that-is-longer-than-32-characters
      STORAGE_TYPE: local
      CORS_ALLOWED_ORIGINS: http://localhost:18081
      BACKEND_PORT: '18080'
      FRONTEND_PORT: '18081'
      BACKEND_URL: http://localhost:18080
      FRONTEND_URL: http://localhost:18081
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build and start the full stack
        run: docker compose up -d --build
      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            curl --fail --silent http://localhost:18080/api/health && break
            if [ "$i" -eq 60 ]; then
              echo "backend did not become healthy" >&2
              docker compose logs backend
              exit 1
            fi
            sleep 2
          done
      - name: Verify Flyway schema version
        run: |
          health=$(curl --fail --silent http://localhost:18080/api/health)
          echo "Health response: $health"
          # Verify database is connected
          echo "$health" | python3 -c "import json,sys; d=json.load(sys.stdin)['data']; assert d['database'] == 'connected', f'database: {d.get(\"database\")}'"
          # Verify schema version exists
          echo "$health" | python3 -c "import json,sys; d=json.load(sys.stdin)['data']; assert 'dbSchemaVersion' in d, 'missing dbSchemaVersion'"
          echo "Flyway schema verified: $(echo "$health" | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['dbSchemaVersion'])")"
      - name: Run API smoke flow
        run: bash scripts/smoke-test.sh
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
