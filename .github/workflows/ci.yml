name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        working-directory: codenow-backend
        run: |
          chmod +x ./mvnw
          ./mvnw --batch-mode clean test

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: codenow-frontend/package-lock.json
      - name: Install dependencies
        working-directory: codenow-frontend
        run: npm ci
      - name: Lint
        working-directory: codenow-frontend
        run: npm run lint:check
      - name: Unit tests and coverage gate
        working-directory: codenow-frontend
        run: npm run test:coverage
      - name: Production build
        working-directory: codenow-frontend
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    env:
      DB_PASSWORD: ci_mysql_password
      DB_NAME: codenow
      DB_SSL_MODE: PREFERRED
      REDIS_PASSWORD: ci_redis_password
      JWT_SECRET: ci-jwt-secret-that-is-longer-than-32-characters
      STORAGE_TYPE: local
      CORS_ALLOWED_ORIGINS: http://localhost:18081
      BACKEND_PORT: '18080'
      FRONTEND_PORT: '18081'
      BACKEND_URL: http://localhost:18080
      FRONTEND_URL: http://localhost:18081
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build and start the full stack
        run: docker compose up -d --build
      - name: Run database migration twice
        run: |
          docker compose exec -T mysql mysql -uroot -p"$DB_PASSWORD" "$DB_NAME" < codenow-backend/migration-medium-priority.sql
          docker compose exec -T mysql mysql -uroot -p"$DB_PASSWORD" "$DB_NAME" < codenow-backend/migration-medium-priority.sql
      - name: Verify schema rollback and re-apply
        run: |
          docker compose exec -T mysql mysql -uroot -p"$DB_PASSWORD" "$DB_NAME" < codenow-backend/rollback-medium-priority.sql
          test "$(docker compose exec -T mysql mysql -N -uroot -p"$DB_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.COLUMNS WHERE TABLE_SCHEMA='$DB_NAME' AND TABLE_NAME='blog_article_tag' AND COLUMN_NAME='is_deleted';")" = "0"
          docker compose exec -T mysql mysql -uroot -p"$DB_PASSWORD" "$DB_NAME" < codenow-backend/migration-medium-priority.sql
          test "$(docker compose exec -T mysql mysql -N -uroot -p"$DB_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.COLUMNS WHERE TABLE_SCHEMA='$DB_NAME' AND TABLE_NAME='blog_article_tag' AND COLUMN_NAME='is_deleted';")" = "1"
      - name: Run API smoke flow
        run: bash scripts/smoke-test.sh
      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
